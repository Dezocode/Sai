name: agent-audit

# ICM CI enforcement (arXiv:2603.16021): audit trailers, semantic hierarchy,
# merge HANDOFF documentation, and optional Slack merge report.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  icm-enforcement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "range=-n 20 ${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install script permissions
        run: |
          chmod +x scripts/verify-agent-audit scripts/verify-semantic-hierarchy \
                   scripts/verify-merge-handoff scripts/ci-merge-handoff-slack \
                   scripts/verify-scaffold-safety scripts/verify-contract-shell-allowlist \
                   scripts/verify-agent-setup scripts/verify-dispatcher-matrix \
                   scripts/agent-memory-scaffold \
                   scripts/agent-contract-scaffold scripts/agent-contract-pr-review

      - name: Verify scaffold path safety
        run: scripts/verify-scaffold-safety

      - name: Verify contract shell allowlists (Phase 5B least-privilege)
        run: scripts/verify-contract-shell-allowlist

      - name: Verify dispatch matrix (all registered agents)
        run: scripts/verify-dispatcher-matrix

      - name: Verify agent setup (profiles, SDK scaffold, contracts)
        env:
          SAI_CI_STRICT_CONTRACTS: "1"
          SAI_CI_REQUIRE_SDK_SMOKE: "0"
        run: scripts/verify-agent-setup

      - name: Validate scaffold script syntax
        run: |
          set -e
          for f in scripts/agent-scaffold scripts/agent-memory-scaffold \
                   scripts/agent-contract-scaffold scripts/agent-contract-pr-review \
                   scripts/lib/agent-path-guards.sh; do
            bash -n "$f"
            echo "OK bash -n $f"
          done

      - name: Verify agent audit metadata
        run: scripts/verify-agent-audit "${{ steps.range.outputs.range }}"

      - name: Verify semantic hierarchy (ICM .ai structure)
        run: scripts/verify-semantic-hierarchy

      - name: Verify merge HANDOFF documentation
        run: |
          scripts/verify-merge-handoff "${{ steps.range.outputs.range }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            scripts/verify-merge-handoff --main-tip
          fi

      - name: Validate event and schema JSON
        run: |
          set -e
          for f in .ai/shared/schemas/*.json; do
            python3 -m json.tool "$f" > /dev/null
            echo "OK $f"
          done
          for f in $(git ls-files '.ai/runs/*/metadata.json'); do
            python3 -m json.tool "$f" > /dev/null
            echo "OK $f"
          done

      - name: Confirm ICM workflow files present
        run: |
          test -f .github/workflows/agent-audit.yml
          test -f .ai/INITIALIZE.md
          test -f .cursor/rules/sai-coordination.mdc
          test -f scripts/verify-agent-setup
          test -f scripts/verify-dispatcher-matrix
          test -f .ai/_config/dispatch-matrix.json
          test -f .ai/shared/references/claude-agent-sdk.md
          test -f .ai/shared/references/dispatcher-desktop-evidence.md
          grep -q verify-merge-handoff .github/workflows/agent-audit.yml
          grep -q verify-semantic-hierarchy .github/workflows/agent-audit.yml
          grep -q verify-agent-setup .github/workflows/agent-audit.yml
          grep -q verify-dispatcher-matrix .github/workflows/agent-audit.yml
          echo "ICM CI files: OK"

      - name: Server-side push confirmation
        if: github.event_name == 'push'
        run: |
          echo "Server-side confirmation: ref=${{ github.ref }} sha=${{ github.sha }} pusher=${{ github.actor }}"
          echo "run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  dispatcher-merge-gate:
    needs: icm-enforcement
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect dispatcher-related PR paths
        id: paths
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" || true)
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(\.ai/agents/mimi/|\.claude/|\.ai/contracts/.*dispatcher|\.ai/_config/dispatch-matrix\.json)'; then
            echo "dispatch=true" >> "$GITHUB_OUTPUT"
          else
            echo "dispatch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install script permissions
        if: steps.paths.outputs.dispatch == 'true'
        run: chmod +x scripts/verify-dispatcher-matrix scripts/verify-agent-setup

      - name: Dispatcher merge gate (Desktop proof + SDK smoke)
        if: steps.paths.outputs.dispatch == 'true'
        env:
          SAI_CI_DISPATCH_MERGE_GATE: "1"
          SAI_CI_REQUIRE_SDK_SMOKE: "1"
          SAI_CI_STRICT_CONTRACTS: "1"
        run: |
          scripts/verify-dispatcher-matrix
          scripts/verify-agent-setup

      - name: Skip dispatcher merge gate (no dispatcher paths)
        if: steps.paths.outputs.dispatch != 'true'
        run: echo "dispatcher-merge-gate: skipped (no mimi/dispatcher paths in PR diff)"

  merge-handoff-slack:
    needs: icm-enforcement
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post merge HANDOFF to #agentupdates
        env:
          SAI_SLACK_BOT_TOKEN: ${{ secrets.SAI_SLACK_BOT_TOKEN }}
          SAI_AGENT_ID: ceo-automation
          GITHUB_REF_NAME: main
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          chmod +x scripts/agent-report scripts/ci-merge-handoff-slack
          scripts/ci-merge-handoff-slack
